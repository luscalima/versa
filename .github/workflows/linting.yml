name: Linting

on:
  pull_request:
    branches: [main]

# TODO: adicionar linting com o ESlint

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create .env
        run: |
          cat <<EOF > .env
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_NAME=versa_test
          DB_NAME_TEST=versa_test
          EOF
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - name: Install dependencies
        run: bun install
      - name: Run formatter
        run: bun run format:check
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create .env
        run: |
          cat <<EOF > .env
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_NAME=versa_test
          DB_NAME_TEST=versa_test
          EOF
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - name: Install dependencies
        run: bun install
      - name: Run linter
        run: bun run lint:check
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Create .env
        run: |
          cat <<EOF > .env
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_NAME=versa_test
          DB_NAME_TEST=versa_test
          EOF
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - name: Install dependencies
        run: bun install
      - name: Run commit linter
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

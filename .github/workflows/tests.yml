name: Automated Tests

on:
  pull_request:
    branches: [main]

jobs:
  vitest:
    name: Vitest Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create .env
        run: |
          cat <<EOF > .env
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_NAME=versa_test
          DB_NAME_TEST=versa_test
          EOF
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun run test

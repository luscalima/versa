name: Setup project
description: Checkout, setup Bun, create .env and install dependencies

inputs:
  bun-version:
    description: Bun version
    required: false
    default: '1.3.11'

runs:
  using: composite
  steps:
    - name: Create .env
      shell: bash
      run: |
        cat <<EOF > .env
        DB_HOST=localhost
        DB_PORT=5432
        DB_USER=postgres
        DB_PASSWORD=postgres
        DB_NAME=versa_test
        DB_NAME_TEST=versa_test
        EOF
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}
    - name: Install dependencies
      shell: bash
      run: bun install
